name: Manual E2E

on:
  workflow_dispatch:
    inputs:
      api_ref:
        description: Branch, tag or SHA to checkout for chaye_API
        required: true
        default: master

permissions:
  contents: read

jobs:
  e2e:
    name: Docker Compose API + frontend + MariaDB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: chaye_web_frontend

      - name: Checkout private API
        uses: actions/checkout@v4
        with:
          repository: Chaye-parcel-traveler/chaye_API
          ref: ${{ inputs.api_ref }}
          token: ${{ secrets.CI_REPO_READ_TOKEN }}
          path: chaye_API

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build E2E images
        working-directory: chaye_web_frontend
        env:
          E2E_API_DIR: ${{ github.workspace }}/chaye_API
          E2E_DB_PORT: 33307
          E2E_API_PORT: 33333
          E2E_FRONTEND_PORT: 33000
          VITE_API_URL: http://api-e2e:3333
          VITE_API_ASSETS_URL: http://api-e2e:3333
          VITE_APP_ENV: e2e
          VITE_E2E: 'true'
        run: docker compose -f compose.e2e.yml build frontend-e2e e2e

      - name: Run Playwright E2E stack
        working-directory: chaye_web_frontend
        env:
          E2E_API_DIR: ${{ github.workspace }}/chaye_API
          E2E_DB_PORT: 33307
          E2E_API_PORT: 33333
          E2E_FRONTEND_PORT: 33000
          PLAYWRIGHT_BASE_URL: http://frontend-e2e:3000
          E2E_API_URL: http://api-e2e:3333
          VITE_API_URL: http://api-e2e:3333
          VITE_API_ASSETS_URL: http://api-e2e:3333
          VITE_APP_ENV: e2e
          VITE_E2E: 'true'
        run: docker compose -f compose.e2e.yml run --rm e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: chaye_web_frontend/playwright-report
          if-no-files-found: ignore

      - name: Stop E2E stack
        if: always()
        working-directory: chaye_web_frontend
        env:
          E2E_API_DIR: ${{ github.workspace }}/chaye_API
          E2E_DB_PORT: 33307
          E2E_API_PORT: 33333
          E2E_FRONTEND_PORT: 33000
        run: docker compose -f compose.e2e.yml down --volumes --remove-orphans
