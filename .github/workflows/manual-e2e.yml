name: Manual E2E

on:
  workflow_dispatch:
    inputs:
      api_ref:
        description: Branch, tag or SHA to checkout for chaye_API
        required: true
        default: master

permissions:
  contents: read

jobs:
  e2e:
    name: API + frontend + MariaDB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: chaye_test
          MARIADB_USER: chaye
          MARIADB_PASSWORD: chaye
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: chaye_web_frontend

      - name: Checkout private API
        uses: actions/checkout@v4
        with:
          repository: Chaye-parcel-traveler/chaye_API
          ref: ${{ inputs.api_ref }}
          token: ${{ secrets.CI_REPO_READ_TOKEN }}
          path: chaye_API

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install API dependencies
        working-directory: chaye_API
        run: npm ci

      - name: Start API
        working-directory: chaye_API
        env:
          NODE_ENV: test
          HOST: 127.0.0.1
          PORT: 3333
          DB_CONNECTION: mysql
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: chaye
          MYSQL_PASSWORD: chaye
          MYSQL_DB_NAME: chaye_test
        run: |
          npm run build --if-present
          nohup npm run dev -- --host 127.0.0.1 > ../api.log 2>&1 &

      - name: Wait for API
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3333 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat api.log
          exit 1

      - name: Install frontend dependencies
        working-directory: chaye_web_frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: chaye_web_frontend
        env:
          VITE_API_URL: http://127.0.0.1:3333
        run: pnpm run build

      - name: Install Playwright
        working-directory: chaye_web_frontend
        run: |
          pnpm add -D @playwright/test
          pnpm exec playwright install --with-deps chromium

      - name: Start frontend
        working-directory: chaye_web_frontend
        env:
          VITE_API_URL: http://127.0.0.1:3333
        run: nohup pnpm exec vite --host 127.0.0.1 --port 3000 > ../frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat frontend.log
          exit 1

      - name: Run Playwright
        working-directory: chaye_web_frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          VITE_API_URL: http://127.0.0.1:3333
        run: pnpm exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: chaye_web_frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-service-logs
          path: |
            api.log
            frontend.log
          if-no-files-found: ignore
